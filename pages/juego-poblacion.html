<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Juego de países</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/juegoPoblacion.css">


</head>

<body>

    <div id="header-placeholder" data-title="Juego de Poblacion"></div>

    <!-- HEADER -->


    <!-- MAIN -->
    <main class="d-flex flex-column align-items-center p-3">
        <div
            class="container text-center bg-primary text-white p-4 mt-3 d-flex flex-column flex-md-row justify-content-between align-items-center" id="pestaña-puntuacion">
            <!-- <h1 class="mb-2 mb-md-0">🌍 Juego de países</h1> -->
            <h1 id="contador-puntuacion">Puntuación: 0</h1>
        </div>
        <div class="container contenedor-tarjetas mt-4">
            <div class="row g-4">

                <!-- TARJETA 1 -->
                <div class="col-12 col-md-6">
                    <div class="card-juego bg-white text-center" id="tarjeta-1">
                        <h2 class="nombre-pais">Nombre País</h2>
                        <img src="#" alt="bandera" class="img-bandera">
                        <h5 class="poblacion text-muted">Población: XXXX</h5>
                    </div>
                </div>

                <!-- TARJETA 2 -->
                <div class="col-12 col-md-6">
                    <div class="card-juego bg-light text-center" id="tarjeta-2">
                        <h2 class="nombre-pais">Nombre País</h2>
                        <img src="#" alt="bandera" class="img-bandera">

                        <div class="mt-3 d-flex justify-content-center gap-3">
                            <button class="btn btn-success btn-custom" id="btn-mas">⬆ Más</button>
                            <button class="btn btn-danger btn-custom" id="btn-menos">⬇ Menos</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div class="modal fade " data-bs-backdrop="static" data-bs-keyboard="false" id="modal-perder" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center rounded-4">

                <div class="modal-header border-0">
                    <h4 class="modal-title w-100">😢 ¡Perdiste!</h4>
                </div>

                <div class="modal-body">
                    <p id="texto-pantalla-final" class="fs-5">
                        Has conseguido una puntuación de
                    </p>
                </div>

                <div class="modal-footer border-0 justify-content-center">
                    <button id="btn-reiniciar" class="btn btn-primary px-4" data-bs-dismiss="modal">
                        Jugar otra vez
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../scripts/juegoPoblacion.js"></script>

    <script src="../scripts/main.js"></script>

</body>

</html>
