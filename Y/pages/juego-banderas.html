<!DOCTYPE html>
<html lang="es" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Banderas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../styles/juegoBanderas.css">
</head>

<body>

    <!-- HEADER -->
    <div id="header-placeholder" data-title="Juego de Banderas"></div>

    <!-- MAIN -->
    <main class="d-flex flex-column align-items-center p-3">

        <div class="container text-center bg-primary text-white p-4 mt-3 d-flex justify-content-around align-items-center"
            id="pestaña-puntuacion">
            <h1 id="contador-puntuacion">Puntuación: 0</h1>
            <h1 id="contador-vidas">Vidas: 3/3</h1>
        </div>

        <!-- CONTENEDOR PRINCIPAL -->
        <div class="container text-center bg-primary text-white p-4 mt-3" id="contenedor-bandera">
            <h2 class="mb-3">¿De qué país es esta bandera?</h2>
            <img src="#" alt="Bandera" id="imagen-bandera" class="img-fluid">
        </div>

        <!-- BUSCADOR -->
        <div class="container contenedor-tarjetas mt-4">

            <div class="card-juego bg-white text-center">

                <div class="row g-3 align-items-center justify-content-center">
                    <div class="col-12 col-md-6">
                        <input type="text" id="buscador" class="form-control" placeholder="Escribe para buscar...">
                    </div>

                    <div class="col-12 col-md-4">
                        <button class="btn btn-primary btn-custom w-100" id="btn-buscar">
                            Buscar
                        </button>
                    </div>
                </div>

                <ul class="list-group mt-4" id="lista-buscador"></ul>

            </div>
        </div>

    </main>

        <!-- MODAL -->
    <div class="modal fade " data-bs-backdrop="static" data-bs-keyboard="false" id="modal-perder" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center rounded-4">

                <div class="modal-header border-0">
                    <h4 class="modal-title w-100">😢 ¡Perdiste!</h4>
                </div>

                <div class="modal-body">
                    <p id="texto-pantalla-final" class="fs-5">
                        Has conseguido una puntuación de
                    </p>
                </div>

                <div class="modal-footer border-0 justify-content-center">
                    <button id="btn-reiniciar" class="btn btn-primary px-4" data-bs-dismiss="modal">
                        Jugar otra vez
                    </button>
                </div>

            </div>
        </div>
    </div>



    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../scripts/juegoBanderas.js"></script>
    <script src="../scripts/main.js"></script>

</body>

</html>
