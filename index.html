<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Juego de países</title>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #ffffff);
            min-height: 100vh;
        }

        header {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .card-juego {
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            transition: transform 0.2s ease;
        }

        .card-juego:hover {
            transform: translateY(-5px);
        }

        .card-juego img {
            max-width: 100%;
            height: 150px;
            object-fit: contain;
            margin: 10px 0;
        }

        .btn-custom {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-custom:hover {
            transform: scale(1.05);
        }

        .contenedor-tarjetas {
            max-width: 900px;
        }

        @media (max-width: 768px) {
            .card-juego {
                margin-bottom: 20px;
            }
        }
    </style>

</head>

<body class="d-flex flex-column align-items-center p-3">

    <!-- HEADER -->
    <header
        class="container text-center bg-primary text-white p-4 mt-3 d-flex flex-column flex-md-row justify-content-between align-items-center">
        <h1 class="mb-2 mb-md-0">🌍 Juego de países</h1>
        <h4 id="contador-puntuacion">Puntuación: 0</h4>
    </header>

    <!-- MAIN -->
    <main class="container contenedor-tarjetas mt-4">
        <div class="row g-4">

            <!-- TARJETA 1 -->
            <div class="col-12 col-md-6">
                <div class="card-juego bg-white text-center" id="tarjeta-1">
                    <h2 class="nombre-pais">Nombre País</h2>
                    <img src="#" alt="bandera" class="img-bandera">
                    <h5 class="poblacion text-muted">Población: XXXX</h5>
                </div>
            </div>

            <!-- TARJETA 2 -->
            <div class="col-12 col-md-6">
                <div class="card-juego bg-light text-center" id="tarjeta-2">
                    <h2 class="nombre-pais">Nombre País</h2>
                    <img src="#" alt="bandera" class="img-bandera">

                    <div class="mt-3 d-flex justify-content-center gap-3">
                        <button class="btn btn-success btn-custom" id="btn-mas">⬆ Más</button>
                        <button class="btn btn-danger btn-custom" id="btn-menos">⬇ Menos</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- MODAL -->
    <div class="modal fade " data-bs-backdrop="static" data-bs-keyboard="false" id="modal-perder" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center rounded-4">

                <div class="modal-header border-0">
                    <h4 class="modal-title w-100">😢 ¡Perdiste!</h4>
                </div>

                <div class="modal-body">
                    <p id="texto-pantalla-final" class="fs-5">
                        Has conseguido una puntuación de
                    </p>
                </div>

                <div class="modal-footer border-0 justify-content-center">
                    <button id="btn-reiniciar" class="btn btn-primary px-4" data-bs-dismiss="modal">
                        Jugar otra vez
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="scriptPrincipal.js"></script>

</body>

</html>
